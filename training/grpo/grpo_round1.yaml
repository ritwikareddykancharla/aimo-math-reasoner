# AIMO3 GRPO Round 1 — AoPS hardest problems (acc=0.125)

data:
  train_files: /home/ssm-user/aimo-math-reasoner/data/grpo_aops_acc0125.parquet
  val_files: /home/ssm-user/aimo-math-reasoner/data/grpo_aops_acc0125.parquet
  train_batch_size: 32
  max_prompt_length: 512
  max_response_length: 2048
  filter_overlong_prompts: true
  truncation: error

algorithm:
  adv_estimator: grpo
  gamma: 1.0
  lam: 1.0
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: openai/gpt-oss-120b
    trust_remote_code: true
  rollout:
    name: vllm
    n: 8
    tensor_parallel_size: 8
    gpu_memory_utilization: 0.4
    temperature: 1.0
    top_p: 1.0
    layered_summon: false
  actor:
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    use_remove_padding: true
    optim:
      lr: 5e-7
      warmup_steps: 20

reward_model:
  enable: false

custom_reward_function:
  path: /home/ssm-user/aimo-math-reasoner/training/grpo/reward_fn.py
  name: compute_reward

trainer:
  nnodes: 1
  n_gpus_per_node: 8
  total_epochs: 1
  project_name: aimo3-grpo
  experiment_name: gpt-oss-120b-round1
  logger:
    - wandb
    - console
  save_freq: 50
  val_before_train: false
  test_freq: -1
  resume_mode: auto
  default_local_dir: /home/ssm-user/aimo-math-reasoner/checkpoints/grpo-round1
  max_actor_ckpt_to_keep: 3
  device: cuda
